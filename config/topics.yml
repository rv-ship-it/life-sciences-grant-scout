scoring:
  keyword_weight: 0.60
  semantic_weight: 0.40
  high_priority_score_threshold: 40
  high_priority_deadline_days: 60
  exclusion_penalty_per_hit: 8.0

# Terms that indicate the grant is NOT health/biotech (industrial bio-based,
# sustainability, agriculture, etc.). Each match subtracts exclusion_penalty_per_hit
# from the combined score. Prevents false positives on "biomanufacturing" terms
# used in non-health contexts.
exclusion_keywords:
  - bio-based materials
  - bio-based products
  - bio-based processes
  - bio-based sector
  - bio-based solutions
  - circular economy
